;
; extensions.conf — Dialplan shell
; Actual rules are loaded via Realtime (SQLite3) using switch => Realtime/@
; Managed by xpbx
;
[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

[from-internal]
; BLF hints — required for dialog event SUBSCRIBE (device state monitoring).
; These must be static; Realtime switch does not provide hints.
exten => 1001,hint,PJSIP/1001
exten => 1002,hint,PJSIP/1002
exten => 1003,hint,PJSIP/1003

; Voicemail access — dial *97 to check your own mailbox
exten => *97,1,NoOp(Voicemail access for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,VoiceMailMain(${CALLERID(num)}@default,s)
 same => n,Hangup()

switch => Realtime/@

; Route SIP MESSAGE between internal endpoints.
[from-internal-messages]
exten => _X.,1,NoOp(Relaying MESSAGE from ${MESSAGE(from)} to ${EXTEN})
 same => n,MessageSend(pjsip:${EXTEN},${MESSAGE(from)})
 same => n,Hangup()

[from-trunk]
; Inbound calls from SIP trunks — routed via Realtime dialplan
switch => Realtime/@

[from-voiceworker]
switch => Realtime/@

; Voiceworker dialplan route — auto-generated when VOICEWORKER_HOST env var is set.
#tryinclude extensions_voiceworker.conf
