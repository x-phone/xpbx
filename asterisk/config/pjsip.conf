;
; pjsip.conf — Only transport config lives here
; All endpoints, auths, and aors are loaded via Realtime (SQLite3)
; Managed by xpbx
;
[global]
type=global
endpoint_identifier_order=username,ip,anonymous

; IP-based identification for VoxGateway → voiceworker-trunk (no auth needed)
; Covers Docker bridge/overlay networks and common private ranges.
[voiceworker-identify]
type=identify
endpoint=voiceworker-trunk
match=172.16.0.0/12
match=10.0.0.0/8
match=192.168.0.0/16

; Transport config is auto-generated at container startup by
; asterisk-entrypoint.sh (detects host IP for NAT/RTP).
; Override by setting EXTERNAL_IP env var in docker-compose.
#include pjsip_transport.conf

; Voiceworker trunk — auto-generated when VOICEWORKER_HOST env var is set.
#tryinclude pjsip_voiceworker.conf
