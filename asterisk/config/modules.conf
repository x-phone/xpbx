[modules]
autoload=yes

; Core modules
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_outbound_publish.so
load => res_pjsip_pubsub.so
load => res_pjsip_registrar.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_endpoint_identifier_user.so
load => res_pjsip_endpoint_identifier_ip.so
load => res_pjsip_endpoint_identifier_anonymous.so
load => res_pjsip_dialog_info_body_generator.so
load => res_pjsip_exten_state.so
load => res_pjsip_caller_id.so
load => res_pjsip_logger.so
load => res_pjsip_notify.so
load => res_pjsip_refer.so
load => res_pjsip_rfc3326.so
load => res_pjsip_messaging.so

; Channel drivers
load => chan_pjsip.so

; Applications
load => app_dial.so
load => app_noop.so
load => app_hangup.so
load => app_verbose.so
load => app_set.so
load => app_voicemail.so

; PBX modules
load => pbx_config.so
load => pbx_realtime.so

; Core functionality
load => res_timing_timerfd.so
load => res_rtp_asterisk.so

; Realtime — SQLite3 backend for PJSIP + dialplan
load => res_config_sqlite3.so
load => res_realtime.so

; HTTP + ARI — used by PBX Manager for monitoring and control
load => res_http_websocket.so
load => res_ari.so
load => res_ari_channels.so
load => res_ari_endpoints.so
load => res_ari_asterisk.so
load => res_ari_model.so
load => res_stasis.so
load => res_stasis_answer.so
load => res_stasis_playback.so
load => res_stasis_snoop.so
load => res_stasis_recording.so

; Don't load unnecessary modules
noload => chan_dahdi.so
noload => chan_iax2.so
noload => chan_sip.so
noload => res_pjsip_transport_websocket.so
noload => res_timing_pthread.so
noload => chan_alsa.so
noload => chan_oss.so