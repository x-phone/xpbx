;
; extconfig.conf — Map Asterisk config families to Realtime backends
; Tells Asterisk to look up these tables in the sqlite3 database
;
[settings]
ps_endpoints => sqlite3,asterisk,ps_endpoints
ps_auths => sqlite3,asterisk,ps_auths
ps_aors => sqlite3,asterisk,ps_aors
ps_contacts => sqlite3,asterisk,ps_contacts
extensions => sqlite3,asterisk,extensions
