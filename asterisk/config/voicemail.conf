;
; voicemail.conf — Voicemail configuration
; Mailboxes are managed by xpbx (created alongside extensions)
;
[general]
format = wav49|wav
maxsilence = 5
silencethreshold = 256
maxlogins = 3
minsecs = 2
maxsecs = 300
skipms = 3000
maxgreet = 60
attach = no
; Store voicemail in the shared data volume
; so xpbx can access recordings if needed
; (default: /var/spool/asterisk/voicemail)

[default]
; Mailboxes are managed by xpbx and written to the shared data volume.
; Format: extension => password,name,email,pager,options
#include /data/voicemail_mailboxes.conf
