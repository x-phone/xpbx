;
; sorcery.conf — Tell PJSIP where to find objects
;
; Static voiceworker trunk (if generated by entrypoint) is loaded from
; pjsip_voiceworker.conf. UI-managed extensions/trunks come from Realtime.
;
; Contacts use astdb (in-memory + AstDB persistence) instead of realtime.
; This avoids SQLite write-lock contention between Asterisk's registrar
; and external processes, and lets remove_existing work correctly.
;
[res_pjsip]
endpoint = config,pjsip_voiceworker.conf
endpoint = realtime,ps_endpoints
auth = config,pjsip_voiceworker.conf
auth = realtime,ps_auths
aor = config,pjsip_voiceworker.conf
aor = realtime,ps_aors
contact = astdb,registrar

[res_pjsip_endpoint_identifier_user]
endpoint = config,pjsip_voiceworker.conf
endpoint = realtime,ps_endpoints

[res_pjsip_endpoint_identifier_ip]
endpoint = config,pjsip_voiceworker.conf
endpoint = realtime,ps_endpoints
